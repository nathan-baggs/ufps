name: Post-merge Version Bump

on:
  push:
    branches:
      - main

jobs:
  bump_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in CMakeLists.txt
        id: version
        run: |
          cmkfile="CMakeLists.txt"
          ver=$(grep -oP 'VERSION\s*"\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$cmkfile")
          if [ -z "$ver" ]; then
            echo "::error::Could not find project version in $cmkfile"
            exit 1
          fi
          
          IFS=. read -r old_year old_month old_day old_tweak <<<"$ver"
          
          # Get current UTC date
          current_year=$(date -u +'%Y')
          current_month=$(date -u +'%-m')
          current_day=$(date -u +'%-d')
          
          if [ "$old_year" = "$current_year" ] && [ "$old_month" = "$current_month" ] && [ "$old_day" = "$current_day" ]; then
            # Same day, increment tweak
            new_tweak=$((old_tweak + 1))
          else
            # New day, reset tweak
            new_tweak=0
          fi
          
          newver="${current_year}.${current_month}.${current_day}.${new_tweak}"
          sed -i -E "0,/VERSION\s*\"[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\"/s//VERSION \"${newver}\"/" "$cmkfile"
          echo "newver=$newver" >> $GITHUB_OUTPUT
          echo "version bumped, $ver -> $newver"

      - name: Commit and push version change
        run: |
          git add CMakeLists.txt
          git diff --cached --quiet && echo "No version change" || (git commit -m "ci: bump version to ${{ steps.version.outputs.newver }}" && git push)
